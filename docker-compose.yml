# docker-compose para controlbio-ponto
# Sobe a aplicação Next.js + banco PostgreSQL + migrações.
#
#   docker compose up -d --build     # build + sobe banco, migra e sobe a app
#   docker compose up -d db          # sobe só o banco (dev local com `npm run dev`)
#   ./seed.sh -n "Admin" -u admin -p senhaForte   # cria o admin inicial (1x)
#   docker compose logs -f app       # acompanha a app
#   docker compose down              # derruba (mantém o volume/dados)
#   docker compose down -v           # derruba e APAGA os dados do banco
#
# Os valores de ${...} vêm do arquivo .env no diretório do projeto.

services:
  db:
    # Versão pinada de propósito: `postgres:latest` pula de major sozinho
    # (ex.: 18 mudou o layout do diretório de dados) e quebra volumes existentes.
    image: postgres:18
    container_name: controlbio-ponto-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-controlbio}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-controlbio}
      POSTGRES_DB: ${POSTGRES_DB:-controlbio_ponto}
    # Porta exposta SÓ no localhost da VPS (não na internet). A app fala com o
    # banco pela rede interna do compose (host "db"), sem precisar dessa porta.
    # Para acesso externo (ex.: Drizzle Studio via túnel SSH), use 127.0.0.1.
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    volumes:
      # PG 18+ guarda os dados num subdiretório por major dentro de
      # /var/lib/postgresql — por isso o mount é no diretório pai (não em /data).
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-controlbio} -d ${POSTGRES_DB:-controlbio_ponto}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # Migrações: serviço de uso único (stage `tools`, tem drizzle-kit/tsx). Roda e
  # encerra. O `up` espera ele concluir antes de subir a app. É idempotente.
  # O mesmo serviço é reaproveitado pelo seed.sh (com o comando sobrescrito).
  migrate:
    build:
      context: .
      dockerfile: Dockerfile
      target: tools
    container_name: controlbio-ponto-migrate
    restart: "no"
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      # Host "db" = nome do serviço acima (rede interna do compose). SEM
      # `?schema=public` (sintaxe do Prisma) — o postgres-js rejeita.
      DATABASE_URL: postgresql://${POSTGRES_USER:-controlbio}:${POSTGRES_PASSWORD:-controlbio}@db:5432/${POSTGRES_DB:-controlbio_ponto}

  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    container_name: controlbio-ponto-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-controlbio}:${POSTGRES_PASSWORD:-controlbio}@db:5432/${POSTGRES_DB:-controlbio_ponto}
      SESSION_MAX_AGE: ${SESSION_MAX_AGE:-28800}
      # Servindo HTTP direto (sem TLS): o cookie de sessão NÃO pode ser Secure,
      # senão o login não funciona. ⚠️ Sem HTTPS, senha/sessão trafegam em texto
      # puro — coloque um proxy TLS (Caddy/nginx) na frente assim que possível.
      SESSION_COOKIE_SECURE: ${SESSION_COOKIE_SECURE:-false}
    ports:
      - "${APP_PORT:-3000}:3000"

volumes:
  postgres_data: